<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>12 - Table Rowspan and Colspan</title>
</head>
<body>
  <table border="1">
    <tr>
      <th colspan="2">Personal Info</th>
    </tr>
    <tr>
      <td>Name</td>
      <td>Charlie</td>
    </tr>
    <tr>
      <td rowspan="2">Contact</td>
      <td>Phone: 12345</td>
    </tr>
    <tr>
      <td>Email: charlie@example.com</td>
    </tr>
  </table>
</body>
</html>
