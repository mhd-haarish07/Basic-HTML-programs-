<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>13 - Div and Span</title>
</head>
<body>
  <div style="border:1px solid black; padding:10px;">
    This is a div block. It takes the full width available.
    <span style="color:red;">This span is inline</span> and only takes as much space as its content.
  </div>
</body>
</html>
