<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>31 - Datalist</title>
</head>
<body>
  <label for="browser">Choose a browser:</label>
  <input list="browsers" id="browser" name="browser">
  <datalist id="browsers">
    <option value="Chrome">
    <option value="Firefox">
    <option value="Safari">
    <option value="Edge">
  </datalist>
</body>
</html>
