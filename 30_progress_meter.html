<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>30 - Progress and Meter</title>
</head>
<body>
  <label for="file">File progress:</label>
  <progress id="file" value="70" max="100"></progress><br><br>

  <label for="disk">Disk usage:</label>
  <meter id="disk" value="0.6" min="0" max="1"></meter>
</body>
</html>
