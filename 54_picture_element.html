<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>54 - Picture Element</title>
</head>
<body>
  <picture>
    <source media="(min-width: 600px)" srcset="https://via.placeholder.com/600x200">
    <source media="(max-width: 599px)" srcset="https://via.placeholder.com/300x150">
    <img src="https://via.placeholder.com/300x150" alt="Responsive image example">
  </picture>
</body>
</html>
