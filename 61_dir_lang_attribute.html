<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>61 - Dir and Lang Attributes</title>
</head>
<body>
  <p lang="en">This paragraph is marked as English text.</p>
  <p lang="fr">Ceci est un texte marqué comme français.</p>
  <p dir="rtl">This paragraph is displayed right-to-left.</p>
  <p dir="ltr">This paragraph is displayed left-to-right (default).</p>
</body>
</html>
