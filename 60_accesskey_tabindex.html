<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>60 - Accesskey and Tabindex</title>
</head>
<body>
  <p>Press Alt + H (or Ctrl+Alt+H on some systems) to focus the Home link.</p>
  <a href="#" accesskey="h">Home</a><br><br>

  <label>First field (tabindex 1): <input type="text" tabindex="1"></label><br>
  <label>Second field (tabindex 2): <input type="text" tabindex="2"></label><br>
  <label>Third field (tabindex 0, natural order): <input type="text" tabindex="0"></label>
</body>
</html>
