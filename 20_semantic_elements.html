<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>20 - Semantic Elements</title>
</head>
<body>
  <header>
    <h1>My Website</h1>
  </header>
  <nav>
    <a href="#">Home</a> | <a href="#">About</a> | <a href="#">Contact</a>
  </nav>
  <main>
    <article>
      <h2>Article Title</h2>
      <p>This is the main content of the article.</p>
    </article>
    <aside>
      <p>This is some related side content.</p>
    </aside>
  </main>
  <footer>
    <p>&copy; 2026 My Website</p>
  </footer>
</body>
</html>
