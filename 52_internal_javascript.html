<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>52 - Internal JavaScript</title>
</head>
<body>
  <button onclick="showMessage()">Click Me</button>
  <p id="msg"></p>

  <script>
    function showMessage() {
      document.getElementById("msg").textContent = "Hello from internal JavaScript!";
    }
  </script>
</body>
</html>
