<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>19 - Fieldset and Legend</title>
</head>
<body>
  <form>
    <fieldset>
      <legend>Personal Details</legend>
      <label for="fname">First name:</label>
      <input type="text" id="fname"><br><br>
      <label for="lname">Last name:</label>
      <input type="text" id="lname">
    </fieldset>
  </form>
</body>
</html>
