<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>04 - Text Formatting</title>
</head>
<body>
  <p><b>Bold text</b></p>
  <p><strong>Strong (important) text</strong></p>
  <p><i>Italic text</i></p>
  <p><em>Emphasized text</em></p>
  <p><u>Underlined text</u></p>
  <p><mark>Highlighted text</mark></p>
  <p><small>Small text</small></p>
  <p>Normal text with <sub>subscript</sub> and <sup>superscript</sup>.</p>
  <p><del>Deleted text</del> and <ins>Inserted text</ins></p>
</body>
</html>
