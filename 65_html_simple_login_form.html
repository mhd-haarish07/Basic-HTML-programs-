<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>65 - Simple Login Form</title>
  <style>
    .login-box {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }
    .login-box input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form>
      <label for="luser">Username</label>
      <input type="text" id="luser" name="luser" required>
      <label for="lpass">Password</label>
      <input type="password" id="lpass" name="lpass" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
