<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>57 - Form GET and POST Methods</title>
</head>
<body>
  <h3>GET Method (data visible in URL)</h3>
  <form action="#" method="get">
    <input type="text" name="search" placeholder="Search...">
    <input type="submit" value="Search (GET)">
  </form>

  <h3>POST Method (data sent in request body)</h3>
  <form action="#" method="post">
    <input type="text" name="username" placeholder="Username">
    <input type="submit" value="Login (POST)">
  </form>
</body>
</html>
