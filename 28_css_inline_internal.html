<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>28 - Inline and Internal CSS</title>
  <style>
    body { font-family: Arial, sans-serif; }
    h1 { color: navy; text-align: center; }
    .highlight { background-color: lightyellow; }
  </style>
</head>
<body>
  <h1>Styled with Internal CSS</h1>
  <p class="highlight">This paragraph uses a class defined in the internal stylesheet.</p>
  <p style="color: green; font-weight: bold;">This paragraph uses inline CSS.</p>
</body>
</html>
