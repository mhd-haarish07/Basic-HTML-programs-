<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>17 - Select Dropdown</title>
</head>
<body>
  <form>
    <label for="country">Choose a country:</label>
    <select id="country" name="country">
      <option value="india">India</option>
      <option value="usa">USA</option>
      <option value="uk">UK</option>
    </select>
  </form>
</body>
</html>
